# Fly.io configuration for the CareSync API.
# Build context is the repo root (this file's directory); the Dockerfile lives
# at apps/api/Dockerfile and does `COPY . .` from the repo root.
#
# Secrets (DATABASE_URL, DIRECT_URL, JWT_SECRET, NEXTAUTH_SECRET, GEMINI_API_KEY,
# SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, ALLOWED_ORIGINS) are NOT stored here —
# set them with:  flyctl secrets set KEY=value --app caresync-api

app = "caresync-api"
primary_region = "ord"

[build]
  dockerfile = "apps/api/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3001"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/api/v1/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Verify the build before deploying anything ──────────────
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Prisma client is required for the API to type-check.
      - run: pnpm --filter @caresync/api exec prisma generate
      - run: pnpm type-check
      - run: pnpm lint
      - run: pnpm build
        env:
          # Web is deployed to Vercel; no standalone bundle needed here.
          BUILD_STANDALONE: 'false'

  # ── Deploy the API to Railway ───────────────────────────────
  deploy-api:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy API to Railway
        run: railway up --service "${{ secrets.RAILWAY_API_SERVICE }}" --ci
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ── Deploy the web app to Vercel (production) ────────────────
  deploy-web:
    needs: verify
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm install -g vercel
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
      - name: Build
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
      - name: Deploy
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
